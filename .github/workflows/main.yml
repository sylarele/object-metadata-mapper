name: CI/CD Workflow

on: [push]

env:
  LATEST_PHP_VERSION: '8.5'

jobs:
  test:
    name: Tests PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [ '8.3', '8.4', '8.5' ]
    steps:
      - name: Pull repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate commit message
        if: matrix.php-version == env.LATEST_PHP_VERSION
        run: ./.github/script/validate_commit.sh

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          ini-values: opcache.enable_cli=1, opcache.jit=tracing, opcache.jit_buffer_size=64M

      - name: Install dependencies with Composer
        uses: ./.github/actions/setup-php-composer
        with:
          php-version: ${{ matrix.php-version }}

      - name: check PSR compliance
        if: matrix.php-version == env.LATEST_PHP_VERSION
        run: ./.github/script/check-psr.sh

      - name: Dependencies tests
        if: matrix.php-version == env.LATEST_PHP_VERSION
        run: make dependencies

      - name: Coding standards
        if: matrix.php-version == env.LATEST_PHP_VERSION
        run: make fix

      - name: Static analysis
        if: matrix.php-version == env.LATEST_PHP_VERSION
        run: php ./vendor/bin/phpstan analyse --memory-limit=1G --error-format=github

      - name: Refactoring
        if: matrix.php-version == env.LATEST_PHP_VERSION
        run: php ./vendor/bin/rector process --dry-run

      - name: Architectural tests
        if: matrix.php-version == env.LATEST_PHP_VERSION
        run: php ./vendor/bin/structura

      - name: Unit tests
        run: php ./vendor/bin/phpunit --testdox --random-order

  deploy-production:
    name: release
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Pull repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create a GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}-
